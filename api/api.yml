components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
  securitySchemes:
    openid:
      bearerFormat: JWT
      flows:
        authorizationCode:
          scopes:
            email: ""
            offline_access: ""
            openid: ""
            profile: ""
          tokenUrl: ""
      in: header
      type: openIdConnect
info:
  title: Builder API
  version: 1.0.0
openapi: 3.0.3
paths:
  /sites/{siteName}:
    get:
      description: Get a site by name.
      operationId: getSite
      parameters:
        - in: path
          name: siteName
          required: true
          schema:
            example: fizz-buzz
            type: string
      responses:
        "200":
          description: The site exists
        "404":
          description: The site was not found
      summary: Get a site
      tags:
        - Sites
    post:
      description: Creates a new site in the builder. This will create a new site folder.
      operationId: createSite
      parameters:
        - in: path
          name: siteName
          required: true
          schema:
            example: fizz-buzz
            type: string
      responses:
        "200":
          description: The site has been created.
        "500":
          description: An internal server error occurred.
      summary: Create a new site
      tags:
        - Sites
  /sites/{siteName}/files/{path}:
    put:
      description: Put a new file to the site.
      operationId: putSiteFile
      parameters:
        - in: path
          name: siteName
          required: true
          schema:
            example: fizz-buzz
            type: string
        - in: path
          name: path
          required: true
          schema:
            example: index.html
            type: string
      requestBody:
        content:
          application/octet-stream:
            schema:
              format: binary
              type: string
              x-contentMediaType: application/octet-stream
        required: true
      responses:
        "201":
          description: The file was uploaded successfully.
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Put a new file to the site
      tags:
        - Sites

