version: 2
before:
  hooks:
    - go mod tidy

env:
  - DOCKER_IMAGE_REPO={{ envOrDefault "DOCKER_IMAGE_REPO" "builder" }}

builds:
  - id: server
    binary: server
    main: server/main.go
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: 386
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
  - id: builder
    binary: builder
    main: main.go
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: 386
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

homebrew_casks:
  - repository:
      owner: zeiss
      name: homebrew-builder-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/zeiss/builder
    description: A teeny-tiny tool to build stuff
    url:
      template: "https://github.com/zeiss/builder/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    directory: Casks
    name: builder
    ids:
      - builder
    binaries:
      - builder
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/builder"] if OS.mac?
    license: APACHE-2.0

dockers_v2:
  - id: builder
    dockerfile: Dockerfile
    images:
      - "{{ .Env.DOCKER_IMAGE_REPO }}/builder"
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "{{ .Major }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"

  - id: server
    dockerfile: Dockerfile
    images:
      - "{{ .Env.DOCKER_IMAGE_REPO }}/server"
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "{{ .Major }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"

archives:
  - id: server
    builds:
      - server
    name_template: "server_{{.Version}}_{{.Os}}_{{.Arch}}"
  - id: builder
    builds:
      - builder
    name_template: "builder_{{.Version}}_{{.Os}}_{{.Arch}}"

release:
  name_template: "v{{ .Version }}"
  header: |
    ## {{.Version}} Release ({{ .Date }})

    Welcome to this new release :rocket:!
  footer: |
    ## Thanks!

    Those were the changes on {{ .Tag }}!

changelog:
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?bug(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - typo
      - (?i)foo

checksum:
  name_template: "builder_checksums.txt"
